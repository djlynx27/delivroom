name: Build Android APK (TWA)

on:
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS_PASSWORD:
        required: false

  # Déclenché manuellement depuis l'onglet Actions de GitHub
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.1)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code entier (ex: 2)'
        required: false
        default: '1'

  # Ou automatiquement sur les tags v*
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 requis par Gradle / Android SDK
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Node.js pour @bubblewrap/cli
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Android SDK — l'image ubuntu-latest en a un mais bubblewrap rejette
      # son layout. setup-android installe un SDK propre avec les composants
      # requis (platform-tools, build-tools, platforms;android-34, etc.)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Bubblewrap CLI a besoin de connaître les paths JDK + Android SDK,
      # sinon il prompt interactivement et le build CI échoue (exit 130).
      # Il valide aussi la présence de <sdk>/tools ou <sdk>/bin à la racine
      # du SDK, alors que les runners GH ne fournissent que cmdline-tools/.
      # On symlink pour satisfaire la validation.
      - name: Configure Bubblewrap (non-interactive)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json
          # Symlink cmdline-tools/latest/bin -> <sdk>/bin pour passer la
          # validation bubblewrap qui cherche <sdk>/tools ou <sdk>/bin.
          CLT_BIN=$(find "${ANDROID_HOME}/cmdline-tools" -maxdepth 2 -name bin -type d | head -1)
          if [ -n "$CLT_BIN" ] && [ ! -e "${ANDROID_HOME}/bin" ]; then
            ln -sf "$CLT_BIN" "${ANDROID_HOME}/bin"
            echo "Symlinked $CLT_BIN -> ${ANDROID_HOME}/bin"
          fi
          ls -la "${ANDROID_HOME}/bin" || true

      # Restaurer le keystore depuis le secret base64
      - name: Restore keystore
        run: |
          echo "${{ secrets['ANDROID_KEYSTORE_BASE64'] }}" | base64 -d > android.keystore
          echo "Keystore restored ($(wc -c < android.keystore) bytes)"

      # Optionnel : patcher la version dans twa-manifest.json
      - name: Patch version
        if: github.event.inputs.version != ''
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          # Fallback to tag on tag-push event
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # strip leading 'v'
            VERSION_CODE=$(git rev-list --count HEAD)
          fi
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.appVersion = '$VERSION';
            m.appVersionCode = parseInt('$VERSION_CODE');
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
            console.log('patched version', m.appVersion, 'code', m.appVersionCode);
          "

      # Build l'APK et l'AAB (bundle Play Store).
      # Bubblewrap lit les passwords via env vars BUBBLEWRAP_KEYSTORE_PASSWORD
      # et BUBBLEWRAP_KEY_PASSWORD (les flags CLI ne sont plus supportés).
      # Le keystore path + alias sont déjà dans twa-manifest.json.
      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      # Upload APK + AAB comme artifact GitHub.
      # Bubblewrap génère:
      #  - app-release-signed.apk  (sideload / direct install)
      #  - app-release-bundle.aab  (upload Play Console)
      - name: Upload APK + AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: delivroom-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
          if-no-files-found: error
          retention-days: 30

      # Créer une Release GitHub si lancé depuis un tag
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: 'Delivroom ${{ github.ref_name }}'
          body: |
            ## Delivroom ${{ github.ref_name }} — Android APK

            ### Installation directe (sideload)
            1. Télécharger `app-release-signed.apk`
            2. Activer "Sources inconnues" sur Android
            3. Installer l'APK

            ### Google Play Store
            Uploader `app-release.aab` dans la Play Console
            (Developer → Production → Créer une nouvelle version)
          files: |
            app-release-signed.apk
            app-release-bundle.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
